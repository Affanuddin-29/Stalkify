{% extends "layout.html" %}
{% block content %}

<div class="flex justify-center items-center min-h-[70vh]">

    <div class="bg-white/5 p-8 rounded-2xl border border-white/10 w-full max-w-md backdrop-blur-lg">

        <h2 class="text-2xl font-bold text-green-400 text-center mb-6">
            Login
        </h2>

        <form method="POST" class="space-y-4">

            <input type="text" name="username" placeholder="Username"
                class="w-full px-4 py-2 rounded bg-white/10 border border-white/20 text-white" required>

            <input type="password" name="password" placeholder="Password"
                class="w-full px-4 py-2 rounded bg-white/10 border border-white/20 text-white" required>

            <button type="submit"
                class="w-full bg-green-500 text-black py-2 rounded-lg font-semibold hover:bg-green-400 transition">
                Login
            </button>

        </form>

        <p class="text-gray-400 text-sm mt-4 text-center">
            Don't have an account?
            <a href="/signup" class="text-green-400 hover:underline">Signup</a>
        </p>

    </div>

</div>

<!-- GSAP -->
<script>
gsap.from("form", { y: 40, opacity: 0, duration: 1 });
</script>

{% endblock %}
